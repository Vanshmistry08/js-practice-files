<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.8)Create an input to convert into the Lower-case into Upper case</title>
</head>
<body>
    <input type="text" id="textInput" oninput="convertToUpperCase()">
    <script>
        function convertToUpperCase() {
            var input = document.getElementById("textInput").value;
            document.getElementById("textInput").value = input.toUpperCase();
        }
    </script>
</body>
</html>
