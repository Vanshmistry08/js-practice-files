<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.11)Show Message on the double click</title>
</head>
<body>
    <p id="text">Double-click this text to show a message.</p>

    <script>
        var text = document.getElementById("text");
        text.addEventListener("dblclick", function() {
            alert("Hello! You double-clicked the text.");
        });
    </script>
</body>
</html>
