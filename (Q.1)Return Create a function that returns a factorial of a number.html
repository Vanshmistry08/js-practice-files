<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.1)Return Create a function </title>
</head>
<body>
    <script>
        function factorial(a) {
            var fact = 1;
            for (var i = 1; i <= a; i++) {
                fact = fact * i;
            }
            return fact;
        }
        var fact = factorial(5);
        console.log(fact);
    </script>
    
</body>
</html>
