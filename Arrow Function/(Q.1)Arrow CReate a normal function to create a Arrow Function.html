<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Function to create a Arrow Function</title>
</head>
<body>

    <Script>
        var helloWorld = () => {
            console.log('Hello World');
        }
        helloWorld();
    </Script>
</body>
</html>
