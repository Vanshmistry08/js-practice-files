<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function to check Even or Odd</title>
</head>
<body>

    <script>
            
var check = (num) => num > 10;

console.log(check(15));  // true
console.log(check(5));   // false

    </script>
    
</body>
</html>
