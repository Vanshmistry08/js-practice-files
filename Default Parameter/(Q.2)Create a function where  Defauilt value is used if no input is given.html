<!DOCTYPE html>
<html lang="en">
<head>
    <title>(Q.2)create a function where  Default value is used if no input is given</title>
</head>
<body>
    <Script>
        function greet(name="Guest"){
            console.log('Hello ${name}!');
        }
        greet(); // output: Hello Guest!
        greet("Alice"); // output: Hello Alice!
    </Script>
    
</body>
</html>
