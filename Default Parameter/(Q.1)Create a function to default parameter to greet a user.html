<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a function to default parameter</title>
</head>
<body>
    <script>
     
        function greet(name = "Guest") {
            console.log("Hello " + name);
        }
        greet("John");
        greet();

    </script>
    
</body>
</html>
