<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.1.1)Create a button to show alert</title>
</head>
<body>
    <button onclick="showAlert()">Click me!</button>

    <script>
        function showAlert() {
            alert("Hello, World!");
        }
    </script>
</body>
