<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.4.4)Show Hidden Text</title>
</head>
<body>
    <p id="myText" style="display: none;">This is a hidden text.</p>
    <button onclick="showText()">Click me!</button>

    <script>
        function showText() {
            document.getElementById("myText").style.display = "block";
        }
    </script>
</body>
</html>
