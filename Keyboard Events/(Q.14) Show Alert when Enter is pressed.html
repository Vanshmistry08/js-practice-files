<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.14) Show Alert when Enter is pressed</title>
</head>
<body>
    <input type="text" id="enterInput" placeholder="Press Enter">
    <script>
        const enterInput = document.getElementById('enterInput');
        enterInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                alert("You pressed Enter!");
            }
        });
    </script>
</body>
</html>
