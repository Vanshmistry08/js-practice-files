<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.5)Function to check the Even or odd</title>
</head>
<body>

    <script>
        function checkEvenOrOdd(a) {
            if (a % 2 == 0) {
                console.log(a + " is Even");
            } else {
                console.log(a + " is Odd");
            }
        }
        checkEvenOrOdd(12);
    </script>
    
</body>
</html>
