<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.3)Return Create Function</title>
</head>
<body>
    <h2>Return Create Function</h2>
    <script>
        function addTwoNo(a, b) {
            return a + b;
        }
        var sum = addTwoNo(100, 200);
        console.log(sum);
    </script>
    
</body>
