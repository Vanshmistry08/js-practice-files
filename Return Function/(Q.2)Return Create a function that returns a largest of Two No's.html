<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.2)Function to return Largest of two No's</title>
</head>
<body>
    <script>
        function largestTwoNo(a, b) {
            if (a > b) {
                return a;
            } else {
                return b;
            }
        }
        var largest = largestTwoNo(100, 2000000);
        console.log(largest);
    </script>
    
</body>
