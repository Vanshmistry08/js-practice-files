<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.15)Count Number of keys pressed</title>
</head>
<body>
    <input type="text" id="keyInput" onkeydown="countKeys(event)">
    <p>Number of keys pressed: <span id="keyCount">0</span></p>

    <script>
        let count = 0;

        function countKeys(event) {
            count++;
            document.getElementById("keyCount").textContent = count;
        }
    </script>
    
</body>
</html>
