<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.3)Store Function to create a Variable and call it.</title>
</head>
<body>
    <script>
        var helloWorld = function(){
            console.log("Hello World");
        }
        helloWorld();
    </script>
    
</body>
