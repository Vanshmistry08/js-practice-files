<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(Q.10)Change Color black when the Mouse leaves it</title>
</head>
<body>
    <p id="text">The 2025 World Figure Skating Championships were held from March 26 to 30, 2025, at the TD Garden in Boston, Massachusetts, in the United States. Sanctioned by the International Skating Union, the World Figure Skating Championships are considered the most prestigious event in figure skating. </p>

    <script>
        var text = document.getElementById("text");
        text.addEventListener("mouseenter", function() {
            text.style.color = "blue";
        });
        text.addEventListener("mouseleave", function() {
            text.style.color = "black";
        });
    </script>
</body>
</html>
